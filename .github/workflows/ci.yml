name: CI

on:
  push:
    branches: [main, backend]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/lcov-report/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t vital-training:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name vt-smoke -p 4000:4000 \
            -e JWT_SECRET=ci-secret \
            -e JWT_EXPIRES_IN=8h \
            vital-training:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:4000/api/health || curl -sf http://localhost:4000 || true
          docker stop vt-smoke
          docker rm vt-smoke